<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Russian Book to Audio</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 12px; }
    form { display: grid; gap: 10px; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
    label { display: grid; gap: 6px; font-size: 14px; }
    input, select, button { padding: 8px; font-size: 14px; }
    button { cursor: pointer; }
    .card { margin-top: 16px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    .mono { font-family: Consolas, monospace; }
    .error-list { margin: 8px 0 0; padding-left: 20px; color: #a40000; }
    .hint { color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Конвертер книги в аудио</h2>
  <p>Выберите файл книги в формате <span class="mono">.txt</span> или <span class="mono">.fb2</span> и запустите обработку.</p>
  <form id="job-form">
    <label>
      Файл книги
      <input id="book-file" type="file" accept=".txt,.fb2" required />
    </label>
    <label>
      Движок
      <select id="engine-id">
        <option value="auto">Автоматически</option>
      </select>
    </label>
    <label>
      Спикер
      <select id="speaker-id">
        <option value="0">Загрузка...</option>
      </select>
    </label>
    <label>
      Скорость
      <input id="speed" type="number" min="0.5" max="2.0" step="0.1" value="1.0" />
    </label>
    <label>
      Использовать GPU
      <select id="use-gpu">
        <option value="true">Да</option>
        <option value="false">Нет</option>
      </select>
    </label>
    <label style="display:flex;flex-direction:row;align-items:center;gap:6px;font-size:13px;padding:4px 0">
      <input id="concat-check" type="checkbox" checked />
      Склеить все части в один MP3-файл (требуется FFmpeg)
    </label>
    <button type="submit">Запустить</button>
  </form>

  <div class="card">
    <div>Job ID: <span id="job-id" class="mono">-</span></div>
    <div>Статус: <span id="status">-</span></div>
    <div>Прогресс: <span id="progress">0%</span></div>
    <div>Движок: <span id="engine">-</span></div>
    <div>Выходная директория: <span id="output-dir" class="mono">-</span></div>
    <div id="validation-block" class="hint" hidden></div>
    <div id="validation-stats" hidden></div>
    <div>Ошибка: <span id="error">-</span></div>
    <div>Итоговый файл: <span id="concat-file" class="mono">-</span></div>
    <ul id="error-list" class="error-list" hidden></ul>
  </div>

  <script>
    const form = document.getElementById("job-form");
    const fileInput = document.getElementById("book-file");
    const statusEl = document.getElementById("status");
    const progressEl = document.getElementById("progress");
    const errorEl = document.getElementById("error");
    const errorListEl = document.getElementById("error-list");
    const validationBlockEl = document.getElementById("validation-block");
    const jobIdEl = document.getElementById("job-id");
    const engineEl = document.getElementById("engine");
    const outputDirEl = document.getElementById("output-dir");
    const concatFileEl = document.getElementById("concat-file");
    const validationStatsEl = document.getElementById("validation-stats");

    let pollTimer = null;
    let enginesData = {};

    async function loadEngines() {
      try {
        const res = await fetch("/engines");
        if (!res.ok) return;
        enginesData = await res.json();
        
        const engineSelect = document.getElementById("engine-id");
        engineSelect.innerHTML = '<option value="auto">Автоматически</option>';
        for (const [key, data] of Object.entries(enginesData)) {
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = data.name;
          engineSelect.appendChild(opt);
        }
        
        updateSpeakers();
      } catch (err) {
        console.error("Failed to load engines", err);
      }
    }

    function updateSpeakers() {
      const engineSelect = document.getElementById("engine-id");
      const speakerSelect = document.getElementById("speaker-id");
      const selectedEngine = engineSelect.value;
      
      speakerSelect.innerHTML = "";
      
      if (selectedEngine === "auto") {
        const opt = document.createElement("option");
        opt.value = "0";
        opt.textContent = "По умолчанию";
        speakerSelect.appendChild(opt);
        return;
      }
      
      const speakers = enginesData[selectedEngine]?.speakers || [];
      speakers.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name;
        speakerSelect.appendChild(opt);
      });
    }

    function clearErrors() {
      errorEl.textContent = "-";
      errorListEl.hidden = true;
      errorListEl.innerHTML = "";
      validationBlockEl.hidden = true;
      validationBlockEl.textContent = "";
      if (validationStatsEl) {
        validationStatsEl.hidden = true;
        validationStatsEl.innerHTML = "";
      }
    }

    function formatStat(label, value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "number" && value > 999) return value.toLocaleString("ru-RU");
      return String(value);
    }

    function renderValidationStats(stats) {
      if (!validationStatsEl || !stats || !stats.total_chars) {
        if (validationStatsEl) validationStatsEl.hidden = true;
        return;
      }
      const rows = [
        ["Символов", stats.total_chars],
        ["Букв", stats.letter_chars],
        ["Абзацев", stats.paragraphs],
        ["Глав с текстом", stats.chapters_with_text],
        ["Секций", stats.sections],
        ["Пустых секций", stats.empty_sections],
        ["Изображений", stats.images],
        ["Таблиц", stats.tables],
        ["Макс. длина абзаца", stats.max_paragraph_len],
      ].filter(r => r[1] !== undefined && r[1] !== null && Number(r[1]) > 0);

      let html = "<table style='font-size:12px;margin-top:6px;border-collapse:collapse;width:100%'>";
      for (const [label, value] of rows) {
        html += `<tr><td style='padding:2px 8px;color:#555'>${label}</td><td style='padding:2px 8px;font-weight:bold'>${formatStat(label, value)}</td></tr>`;
      }
      html += "</table>";
      validationStatsEl.innerHTML = html;
      validationStatsEl.hidden = false;
    }

    function showApiError(detail) {
      clearErrors();
      if (typeof detail === "object" && detail !== null && Array.isArray(detail.issues)) {
        errorEl.textContent = detail.message || "Ошибка проверки файла";
        errorListEl.hidden = false;
        detail.issues.forEach((issue) => {
          const item = document.createElement("li");
          item.textContent = issue.message;
          errorListEl.appendChild(item);
        });
        if (detail.stats) renderValidationStats(detail.stats);
        return;
      }
      if (typeof detail === "string") {
        errorEl.textContent = detail;
        return;
      }
      errorEl.textContent = JSON.stringify(detail);
    }

    async function validateSelectedFile(file) {
      if (!file || !file.name.toLowerCase().endsWith(".fb2")) {
        clearErrors();
        return true;
      }

      validationBlockEl.hidden = false;
      validationBlockEl.textContent = "Проверка FB2...";

      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch("/books/validate", { method: "POST", body: fd });
      const payload = await res.json();
      if (!res.ok) {
        showApiError(payload.detail || payload);
        validationBlockEl.textContent = "FB2 не прошёл проверку.";
        return false;
      }
      if (!payload.ok) {
        showApiError(payload);
        validationBlockEl.textContent = "FB2 не прошёл проверку.";
        return false;
      }

      clearErrors();
      validationBlockEl.hidden = false;
      validationBlockEl.textContent = "FB2 прошёл проверку и готов к озвучке.";
      if (payload.stats) renderValidationStats(payload.stats);
      return true;
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) {
        clearErrors();
        return;
      }
      try {
        await validateSelectedFile(file);
      } catch (err) {
        showApiError(String(err));
      }
    });

    document.getElementById("engine-id").addEventListener("change", updateSpeakers);
    loadEngines();

    async function pollStatus(jobId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/jobs/${jobId}`);
          if (!res.ok) return;
          const data = await res.json();
          statusEl.textContent = data.status || "-";
          progressEl.textContent = `${Math.round((data.progress || 0) * 100)}%`;
          engineEl.textContent = (data.meta && data.meta.engine) || "-";
          outputDirEl.textContent = data.output_dir || "-";
          concatFileEl.textContent = (data.meta && data.meta.concat_file) || "-";
          errorEl.textContent = data.error || "-";
          if (data.status === "done" || data.status === "failed") {
            clearInterval(pollTimer);
          }
        } catch (err) {
          errorEl.textContent = String(err);
        }
      }, 1000);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const file = fileInput.files[0];
      if (!file) {
        alert("Выберите файл книги.");
        return;
      }

      statusEl.textContent = "sending";
      progressEl.textContent = "0%";
      engineEl.textContent = "-";
      outputDirEl.textContent = "-";
      clearErrors();

      try {
        const isValid = await validateSelectedFile(file);
        if (!isValid) {
          statusEl.textContent = "failed";
          return;
        }
      } catch (err) {
        statusEl.textContent = "failed";
        showApiError(String(err));
        return;
      }

      const fd = new FormData();
      fd.append("file", file);
      fd.append("engine", document.getElementById("engine-id").value || "auto");
      fd.append("speaker", document.getElementById("speaker-id").value || "0");
      fd.append("speed", document.getElementById("speed").value || "1.0");
      fd.append("use_gpu", document.getElementById("use-gpu").value);
      fd.append("concat", document.getElementById("concat-check").checked ? "true" : "false");

      try {
        const res = await fetch("/jobs", { method: "POST", body: fd });
        const payload = await res.json();
        if (!res.ok) {
          showApiError(payload.detail || payload);
          statusEl.textContent = "failed";
          return;
        }
        const jobId = payload.job_id;
        jobIdEl.textContent = jobId;
        statusEl.textContent = "pending";
        await pollStatus(jobId);
      } catch (err) {
        statusEl.textContent = "failed";
        showApiError(String(err));
      }
    });
  </script>
</body>
</html>
